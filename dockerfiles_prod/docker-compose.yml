services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: artreid
      POSTGRES_USER: artreid
      POSTGRES_PASSWORD: artreid
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artreid -d artreid"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/artreid
      SPRING_DATASOURCE_USERNAME: artreid
      SPRING_DATASOURCE_PASSWORD: artreid
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
