services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: artreid
      POSTGRES_USER: artreid
      POSTGRES_PASSWORD: artreid
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artreid -d artreid"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/mipt-ck-hackaton-2026/artreid-3:latest
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/artreid
      SPRING_DATASOURCE_USERNAME: artreid
      SPRING_DATASOURCE_PASSWORD: artreid
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRINGDOC_SWAGGER_UI_PATH: /api/swagger-ui
      SPRINGDOC_API_DOCS_PATH: /api/api-docs
      SERVER_FORWARD_HEADERS_STRATEGY: framework
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: ghcr.io/mipt-ck-hackaton-2026/artreid-3-frontend:latest
    environment:
      - VITE_API_URL=/api
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
      frontend:
        condition: service_healthy

volumes:
  postgres_data:
