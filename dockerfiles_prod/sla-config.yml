sla:
  b2c:
    reaction_minutes: 30           # SLA-1: время реакции менеджера
    to_assembly_hours: 4           # SLA-2: от реакции до сборки
    assembly_to_delivery_days: 1   # SLA-3: сборка до передачи в доставку
    total_days: 2                  # B2C-total: полный цикл B2C
  delivery:
    to_pvz_days: 5                 # SLA-4: до ПВЗ
    pvz_storage_days: 7            # SLA-5: хранение на ПВЗ
    total_days: 14                 # DEL-total: полный цикл доставки
  full_cycle_days: 16              # FULL: полный цикл сделки

  breach_buckets:
    short_minutes: [15, 60]        # для SLA-1: до 15 / 15-60 / >60 мин
    days: [1, 3]                   # для остальных: до 1 / 1-3 / >3 дней
